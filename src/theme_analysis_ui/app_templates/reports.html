{% extends "core.html" %}
{% set page_title = "View reports" %}

{% block pageContent %}
<div class="ons-page__container ons-container ons-u-pt-m ons-u-pb-l">
    <main id="main-content" class="ons-grid ons-grid--column@xxs@s">
        <div class="ons-grid__col ons-col-12 ons-col@l-10">

            <h1 class="ons-u-fs-xxl ons-u-mb-m">View reports</h1>

            {% if reports %}
                <ul class="ons-list">
                    {% for report in reports %}
                        <li class="ons-list__item ons-u-mb-s">
                            <a href="{{ url_for('ui.view_report', filename=report.filename) }}">
                                {{ report.title }}
                            </a>
                            <span class="ons-u-fs-s"> — created {{ report.created }}</span>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No reports found.</p>
            {% endif %}

        </div>
    </main>
</div>
{% endblock %}
