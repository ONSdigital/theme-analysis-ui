{% extends "core.html" %}
{% set page_title = page_title or "Report" %}

{% block pageContent %}
<div class="ons-page__container ons-container ons-u-pt-m ons-u-pb-l">
    <main id="main-content" class="ons-grid ons-grid--column@xxs@s">
        <div class="ons-grid__col ons-col-12 ons-col@l-10">

            {% block page_body %}
            <h1 class="ons-u-fs-xxl ons-u-mb-m">{{ page_title }}</h1>

            <p class="ons-u-mb-m">
                <a href="{{ url_for('ui.reports') }}">Back to reports</a>
            </p>

            {{ html_report | safe }}
            {% endblock %}
        </div>
    </main>
</div>
{% endblock %}
